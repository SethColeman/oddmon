name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore Oddmon.slnx
      - run: dotnet build Oddmon.slnx --no-restore --configuration Release
      - run: dotnet test Oddmon.slnx --no-build --configuration Release --filter "Category!=Integration"
